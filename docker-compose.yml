# Multi-container orchestration for Rangira Agro-Farming
# Defines the Database (PostgreSQL), Backend (Spring Boot), and Frontend (React/Nginx)
services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16
    container_name: rangira_postgres
    environment:
      POSTGRES_DB: rangira_agro_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Persistent volume mapping to ensure database data survives container restarts
      - rangira_postgres_data:/var/lib/postgresql/data

  # Spring Boot Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rangira_backend
    depends_on:
      postgres:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rangira_agro_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Automatically update database schema based on JPA entity definitions
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_FRONTEND_URL: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads

  # React Frontend Service (served via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
        REACT_APP_BACKEND_URL: ""
    container_name: rangira_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  rangira_postgres_data: